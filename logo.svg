<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <defs>
    <linearGradient id="emberGlyphGradient" x1="6" y1="20" x2="19" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7a3cff" />
      <stop offset="52%" stop-color="#ff8a1f" />
      <stop offset="100%" stop-color="#ff5a1f" />
    </linearGradient>
  </defs>
  <!-- 🔥 OUTLINE FIRE ICON -->
  <g transform="translate(15, 18) scale(3.4)">
    <path 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      stroke-width="1.2"
      stroke="url(#emberGlyphGradient)"
      fill="none"
      d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" 
    />
    <path 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      stroke-width="1.2"
      stroke="url(#emberGlyphGradient)"
      fill="none"
      d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z" 
    />
  </g>

  <!-- TYPOGRAPHY -->
  <text 
    x="100" 
    y="78" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
    fill="#FFFFFF"
  >
    <!-- Thicker weight for 'Ember' -->
    <tspan font-weight="800" font-size="52" letter-spacing="-0.5">Ember</tspan>
    <!-- Thinner weight for 'Bots' with explicit spacing (reset to 16) -->
    <tspan font-weight="300" font-size="52" dx="8" letter-spacing="0.5">Bots</tspan>
  </text>
</svg>
