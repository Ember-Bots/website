<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <!-- Robot body gradient — warm dark charcoal-brown -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#362118"/>
      <stop offset="100%" stop-color="#1c1009"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e2820"/>
      <stop offset="100%" stop-color="#271510"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1c13"/>
      <stop offset="100%" stop-color="#1a0e07"/>
    </linearGradient>
    <!-- Flame — linear gradient top-to-bottom: bright tip, dark base -->
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5cc"/>
      <stop offset="25%" stop-color="#ffcc66"/>
      <stop offset="60%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#b83a10"/>
    </linearGradient>
    <!-- Flame glow -->
    <filter id="flameGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Eye glow -->
    <filter id="eyeGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Antenna glow -->
    <filter id="antGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip body interior so flame stays inside -->
    <clipPath id="bodyClip">
      <rect x="24" y="63" width="72" height="46" rx="12"/>
    </clipPath>
  </defs>

  <!-- =============================================
       ROBOT — centered in 0–120 horizontal zone
       Total vertical span: y=5 to y=115
       ============================================= -->

  <!-- Antenna stem -->
  <rect x="57.5" y="6" width="5" height="13" rx="2.5"
        fill="#2a1710" stroke="#5c3d2e" stroke-width="0.6"/>
  <!-- Antenna tip orb -->
  <circle cx="60" cy="6" r="4.5" fill="#ff6b35" filter="url(#antGlow)"/>
  <circle cx="60" cy="6" r="2.2" fill="#ffcc88"/>

  <!-- HEAD -->
  <rect x="32" y="19" width="56" height="38" rx="10"
        fill="url(#headGrad)" stroke="#5c3d2e" stroke-width="0.8"/>

  <!-- Brow ridge hint (very subtle) -->
  <line x1="39" y1="26" x2="55" y2="26" stroke="#4a2e1f" stroke-width="0.7" opacity="0.6"/>
  <line x1="65" y1="26" x2="81" y2="26" stroke="#4a2e1f" stroke-width="0.7" opacity="0.6"/>

  <!-- Eye sockets — deep recessed -->
  <ellipse cx="47.5" cy="36" rx="7.5" ry="7"
           fill="#0e0705" stroke="#2e1c13" stroke-width="0.5"/>
  <ellipse cx="72.5" cy="36" rx="7.5" ry="7"
           fill="#0e0705" stroke="#2e1c13" stroke-width="0.5"/>

  <!-- Eyes glowing -->
  <circle cx="47.5" cy="36" r="4.8" fill="#ff6b35" filter="url(#eyeGlow)"/>
  <circle cx="72.5" cy="36" r="4.8" fill="#ff6b35" filter="url(#eyeGlow)"/>
  <!-- Eye specular -->
  <circle cx="49.3" cy="33.8" r="1.5" fill="#fff0e0" opacity="0.7"/>
  <circle cx="74.3" cy="33.8" r="1.5" fill="#fff0e0" opacity="0.7"/>

  <!-- Mouth — slight smile curve -->
  <path d="M50 49.5 Q60 52.5 70 49.5"
        stroke="#7a4a35" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- NECK connector -->
  <rect x="50" y="57" width="20" height="7" rx="3"
        fill="#1e1009" stroke="#5c3d2e" stroke-width="0.6"/>
  <!-- Neck detail lines -->
  <line x1="55" y1="59.5" x2="55" y2="62.5" stroke="#5c3d2e" stroke-width="0.6" opacity="0.8"/>
  <line x1="60" y1="59.5" x2="60" y2="62.5" stroke="#5c3d2e" stroke-width="0.6" opacity="0.8"/>
  <line x1="65" y1="59.5" x2="65" y2="62.5" stroke="#5c3d2e" stroke-width="0.6" opacity="0.8"/>

  <!-- BODY -->
  <rect x="24" y="63" width="72" height="46" rx="12"
        fill="url(#bodyGrad)" stroke="#5c3d2e" stroke-width="0.8"/>

  <!-- Body top panel line -->
  <line x1="34" y1="72" x2="86" y2="72"
        stroke="#4a2e1f" stroke-width="0.8" opacity="0.7"/>

  <!-- FLAME — ember motif, clipped to body bounds -->
  <g clip-path="url(#bodyClip)">
    <!-- Teardrop flame: tip y=68 (top), base y=95 (bottom), ±9px wide at shoulder -->
    <path d="
      M60,68
      C62.5,71  70,78  69,85
      C68,90  64,94  60,95
      C56,94  52,90  51,85
      C50,78  57.5,71 60,68Z"
          fill="url(#flameGrad)" filter="url(#flameGlow)"/>
    <!-- Inner flame highlight — bright hot core near tip -->
    <path d="
      M60,72
      C62,75 64,79 63.5,83.5
      C63,87 61.5,90 60,91
      C58.5,90 57,87 56.5,83.5
      C56,79 58,75 60,72Z"
          fill="#fff8d0" opacity="0.45"/>
  </g>

  <!-- CIRCUIT — left cluster (orange nodes) -->
  <circle cx="34" cy="82" r="3.2" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.7"/>
  <circle cx="34" cy="82" r="1.3" fill="#ff6b35" opacity="0.6"/>
  <polyline points="37.2,82 43,82 43,91"
            stroke="#5c3d2e" stroke-width="1" fill="none" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="43" cy="91" r="2.5" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.65"/>
  <circle cx="43" cy="91" r="1" fill="#ff6b35" opacity="0.55"/>

  <!-- CIRCUIT — right cluster (purple nodes) -->
  <circle cx="86" cy="82" r="3.2" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.65"/>
  <circle cx="86" cy="82" r="1.3" fill="#6c63ff" opacity="0.55"/>
  <polyline points="82.8,82 77,82 77,91"
            stroke="#3d3780" stroke-width="1" fill="none" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="77" cy="91" r="2.5" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.65"/>
  <circle cx="77" cy="91" r="1" fill="#6c63ff" opacity="0.55"/>

  <!-- Body bottom panel line -->
  <line x1="34" y1="100" x2="86" y2="100"
        stroke="#4a2e1f" stroke-width="0.8" opacity="0.6"/>

  <!-- LEFT ARM -->
  <rect x="10" y="68" width="15" height="32" rx="7.5"
        fill="url(#armGrad)" stroke="#5c3d2e" stroke-width="0.7"/>
  <!-- Cuff band -->
  <rect x="10" y="91" width="15" height="8" rx="4"
        fill="#160b04" stroke="#5c3d2e" stroke-width="0.6"/>

  <!-- RIGHT ARM -->
  <rect x="95" y="68" width="15" height="32" rx="7.5"
        fill="url(#armGrad)" stroke="#5c3d2e" stroke-width="0.7"/>
  <!-- Cuff band -->
  <rect x="95" y="91" width="15" height="8" rx="4"
        fill="#160b04" stroke="#5c3d2e" stroke-width="0.6"/>

  <!-- FEET -->
  <rect x="32" y="107" width="22" height="8" rx="4"
        fill="#160b04" stroke="#5c3d2e" stroke-width="0.7"/>
  <rect x="66" y="107" width="22" height="8" rx="4"
        fill="#160b04" stroke="#5c3d2e" stroke-width="0.7"/>

  <!-- =============================================
       WORDMARK — Trebuchet MS Bold 42px
       Centered in x=120..480 zone (360px wide)
       "Ember" (127px) + space (12px) + "Bots" (84px) = 223px total
       x_start = 120 + (360-223)/2 = 188
       "Bots" x = 188 + 127 + 12 = 327
       ============================================= -->

  <!-- "Ember" — near-white -->
  <text
    x="188"
    y="71"
    font-family="'Trebuchet MS', 'Arial', sans-serif"
    font-weight="700"
    font-size="42"
    fill="#e8eaf6"
    letter-spacing="-0.5">Ember</text>

  <!-- "Bots" — ember orange -->
  <text
    x="327"
    y="71"
    font-family="'Trebuchet MS', 'Arial', sans-serif"
    font-weight="700"
    font-size="42"
    fill="#ff6b35"
    letter-spacing="-0.5">Bots</text>

</svg>
